name: Sync to GitLab

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Push to GitLab
        run: |
          git remote add g
          git push gitlab mainitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}git@gitlab.com/waydroirdtest/Proxytv.git
          git push gitlab main
